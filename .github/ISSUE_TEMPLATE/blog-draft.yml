name: 블로그/인스타 초안 요청
description: 사진과 메모를 올리면 네이버 블로그·인스타 초안을 자동 생성합니다.
title: "[초안] "
labels: ["draft-request"]
body:
  - type: markdown
    attributes:
      value: |
        사진만 첨부하면 자동으로 **네이버 블로그 + 인스타그램 두 채널 초안**이 모두 생성됩니다.
        나머지 항목(주제·분위기·날짜)은 비워둬도 동작합니다(이미지에서 추론).
  - type: dropdown
    id: channels
    attributes:
      label: 채널
      description: 기본값은 둘 다 생성입니다.
      options:
        - 둘 다 (기본)
        - 네이버 블로그만
        - 인스타그램만
      default: 0
    validations:
      required: false
  - type: input
    id: subject
    attributes:
      label: 주제 / 수업 종류 (선택)
      placeholder: "예) 5월 둘째주 성인 비즈니스 회화"
    validations:
      required: false
  - type: textarea
    id: vibe
    attributes:
      label: 분위기 / 강조 포인트 (선택)
      placeholder: "예) 발표 수업, 학생들 많이 웃었음, 신규 등록 환영"
    validations:
      required: false
  - type: input
    id: when
    attributes:
      label: 시기 / 날짜 (선택, 트렌드 리서치 기준)
      placeholder: "2026-05-10  (비우면 워크플로우 실행 시점 기준)"
    validations:
      required: false
  - type: textarea
    id: photos
    attributes:
      label: 사진 (이 영역에 드래그&드롭) — 필수
      description: 한 장 이상 반드시 첨부. 마크다운 ![](url) 형태로 자동 삽입됩니다.
    validations:
      required: true
