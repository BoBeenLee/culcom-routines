name: Refresh Template Date

# 이슈 템플릿 .github/ISSUE_TEMPLATE/blog-draft.yml 의 title 필드 안 [YYYY-MM-DD]
# 자리를 매일 KST 자정에 그날 날짜로 갱신한다. GitHub Issue Forms는 정적 title만
# 지원하므로 cron으로 파일 자체를 다시 써서 폼 진입 시 오늘 날짜가 보이게 한다.

on:
  schedule:
    # 15:00 UTC = 00:00 KST 다음날 → KST 자정에 실행
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # GITHUB_TOKEN으로 push해도 다른 워크플로우는 트리거 안 됨(루프 방지)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace title date with today (Asia/Seoul)
        id: rewrite
        run: |
          today=$(TZ='Asia/Seoul' date +'%Y-%m-%d')
          echo "today=${today}" >> "$GITHUB_OUTPUT"
          file=.github/ISSUE_TEMPLATE/blog-draft.yml

          # 1) [YYYY-MM-DD] 리터럴 → 오늘
          # 2) [2026-05-09] 같이 이전 날짜 → 오늘
          sed -i -E \
            -e "s/\\[YYYY-MM-DD\\]/[${today}]/" \
            -e "s/\\[[0-9]{4}-[0-9]{2}-[0-9]{2}\\]/[${today}]/" \
            "$file"

          if git diff --quiet -- "$file"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          echo "--- preview ---"
          grep -E '^title:' "$file" || true

      - name: Commit and push if changed
        if: steps.rewrite.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/ISSUE_TEMPLATE/blog-draft.yml
          git commit -m "chore: refresh issue template date to ${{ steps.rewrite.outputs.today }}"
          git push
