name: Blog Draft

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write   # gh-pages 브랜치에 네이버 미리보기 push
  issues: write

# 같은 이슈에 대해 opened + labeled 가 동시에 발행되어 중복 실행되는 것을 직렬화한다.
# cancel-in-progress: false → 두 번째 런은 첫 번째 런이 끝난 뒤 시작하고, precheck에서 drafted 라벨을 보고 종료.
concurrency:
  group: blog-draft-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  precheck:
    # 1차 가드: 이벤트 시점 스냅샷에서 빠르게 거름
    # public 레포에서 외부인이 issue로 워크플로우를 트리거해 Gemini 쿼터/Actions 분량을 소진시키는 abuse 방지를
    # 위해 author_association 체크 추가. OWNER/MEMBER/COLLABORATOR 만 통과.
    if: |
      contains(github.event.issue.labels.*.name, 'draft-request') &&
      !contains(github.event.issue.labels.*.name, 'drafted') &&
      (
        github.event.issue.author_association == 'OWNER' ||
        github.event.issue.author_association == 'MEMBER' ||
        github.event.issue.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Re-check label state at runtime (live API)
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          labels=$(gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json labels --jq '.labels[].name' | tr '\n' ' ')
          echo "current labels: ${labels}"
          if echo "${labels}" | grep -qw "drafted"; then
            echo "이미 drafted — 중복 실행 종료"
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

  draft:
    needs: precheck
    if: needs.precheck.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Restore Gemini OAuth credentials
        env:
          GEMINI_OAUTH_CREDS: ${{ secrets.GEMINI_OAUTH_CREDS }}
        run: |
          mkdir -p ~/.gemini
          printf '%s' "$GEMINI_OAUTH_CREDS" | base64 -d > ~/.gemini/oauth_creds.json
          chmod 600 ~/.gemini/oauth_creds.json
          cat > ~/.gemini/settings.json <<'JSON'
          {
            "security": {
              "auth": {
                "selectedType": "oauth-personal"
              }
            }
          }
          JSON
          cat > ~/.gemini/google_accounts.json <<'JSON'
          {
            "active": "cultisttp@gmail.com",
            "old": []
          }
          JSON

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli@0.41.1

      - name: Parse issue body
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node flows/blog-draft/scripts/parse-issue.mjs

      - name: Apply channel labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          for ch in $(jq -r '.channels[]' outputs/issue.json); do
            echo "label: $ch"
            gh issue edit "$ISSUE_NUMBER" --add-label "$ch" || true
          done

      - name: Rename issue title to "[YYYY-MM-DD] 스터디 블로그·인스타 자동 생성"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          when=$(jq -r '.when' outputs/issue.json)
          new_title="[${when}] 스터디 블로그·인스타 자동 생성"
          echo "rename → ${new_title}"
          gh issue edit "$ISSUE_NUMBER" --title "$new_title" || true

      - name: Download attached images
        env:
          # Private 레포의 user-attachments는 자동 발급되는 GITHUB_TOKEN으로 접근 불가.
          # 개인 PAT(repo scope)를 ATTACHMENTS_PAT secret에 등록하면 우선 사용한다.
          GITHUB_TOKEN: ${{ secrets.ATTACHMENTS_PAT || secrets.GITHUB_TOKEN }}
        run: node flows/blog-draft/scripts/extract-images.mjs

      - name: Compute trend cache key
        id: tkey
        run: |
          when=$(jq -r '.when' outputs/issue.json)
          echo "when=${when}" >> "$GITHUB_OUTPUT"
          echo "use date=${when} for trend cache key"

      - name: Restore trends cache (per-date)
        id: trends-cache
        uses: actions/cache@v4
        with:
          path: outputs/trends.json
          # 같은 날짜(when) + 같은 trend-research.md 해시면 캐시 히트.
          # 프롬프트가 바뀌면 자동으로 캐시 무효화.
          key: blog-draft-trends-${{ steps.tkey.outputs.when }}-${{ hashFiles('flows/blog-draft/prompts/trend-research.md') }}

      - name: Fetch trends (Gemini + web search)
        if: steps.trends-cache.outputs.cache-hit != 'true'
        env:
          GEMINI_CLI_TRUST_WORKSPACE: 'true'
        run: node flows/blog-draft/scripts/fetch-trends.mjs

      - name: Trends cache hit — skip fetch
        if: steps.trends-cache.outputs.cache-hit == 'true'
        run: |
          echo "trends cache hit for ${{ steps.tkey.outputs.when }} — outputs/trends.json 재사용"
          jq . outputs/trends.json | head -30

      - name: Generate drafts (per-channel artifacts only)
        env:
          GEMINI_CLI_TRUST_WORKSPACE: 'true'
        run: node flows/blog-draft/scripts/draft.mjs

      - name: Publish naver preview to GitHub Pages
        id: preview
        if: hashFiles('outputs/naver.html') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -e
          owner_lc=$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')
          repo_lc=$(printf '%s' "$REPO" | tr '[:upper:]' '[:lower:]')
          remote="https://x-access-token:${GH_TOKEN}@github.com/${OWNER}/${REPO}.git"
          work=$(mktemp -d)

          if git ls-remote --exit-code --heads "$remote" gh-pages > /dev/null 2>&1; then
            git clone --depth=1 --branch=gh-pages --single-branch "$remote" "$work/pages"
          else
            mkdir -p "$work/pages"
            git -C "$work/pages" init -q -b gh-pages
            git -C "$work/pages" remote add origin "$remote"
            cat > "$work/pages/index.html" <<HTML
          <!doctype html><meta charset="utf-8"><title>${REPO} previews</title>
          <h1>${REPO}</h1>
          <p>Auto-generated blog-draft previews live under <code>/previews/issue-N.html</code>.</p>
          HTML
          fi

          mkdir -p "$work/pages/previews"
          cp outputs/naver.html "$work/pages/previews/issue-${ISSUE_NUMBER}.html"

          cd "$work/pages"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -q -m "preview: issue #${ISSUE_NUMBER} (run ${RUN_ID})"
            git push -q origin HEAD:gh-pages
          fi

          # cache-bust 으로 ?v=run_id 추가 — 동일 이슈 재생성 시 브라우저 캐시 강제 무효화
          pages_url="https://${owner_lc}.github.io/${repo_lc}/previews/issue-${ISSUE_NUMBER}.html?v=${RUN_ID}"
          echo "pages_url=${pages_url}"
          echo "pages_url=${pages_url}" >> "$GITHUB_OUTPUT"

      - name: Wait for Pages deployment
        if: steps.preview.outputs.pages_url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          # Pages 빌드는 push 후 30~60초 걸림. 최대 3분까지 폴링하다가 timeout 시 그냥 진행
          # (코멘트는 어쨌든 게시되고, 사용자가 잠시 후 새로고침하면 됨).
          for i in $(seq 1 36); do
            if out=$(gh api "/repos/${OWNER}/${REPO}/pages/builds/latest" --jq '.status' 2>/dev/null); then
              status="$out"
            else
              status="missing"
            fi
            echo "[${i}] pages build status: ${status}"
            case "${status}" in
              built)
                echo "pages deployed"
                break
                ;;
              errored)
                echo "pages build errored — 코멘트는 그대로 진행"
                break
                ;;
              missing)
                echo "Pages 미활성화 — Repo Settings → Pages 에서 Source: Deploy from a branch / Branch: gh-pages '/' 로 설정 필요. 코멘트는 그대로 진행"
                break
                ;;
            esac
            sleep 5
          done

      - name: Compose issue comment
        env:
          NAVER_PREVIEW_URL: ${{ steps.preview.outputs.pages_url }}
        run: node flows/blog-draft/scripts/compose-comment.mjs

      - name: Comment drafts on issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body-file outputs/comment.md
          gh issue edit "$ISSUE_NUMBER" --add-label drafted

      - name: On failure, comment error
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "❌ 초안 생성 실패. 로그: $RUN_URL"
          gh issue edit "$ISSUE_NUMBER" --add-label error || true
